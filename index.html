<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <!-- THIS IS THE ONLY VALID SDK URL -->
    <script src="https://gstatic.com"></script>
    <style>
        body {
            margin: 0;
            background: blue;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #bg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
    </style>
</head>
<body>
    <cast-media-player style="display:none"></cast-media-player>
    <img id="bg" src="">
    <script>
/** @global */
var cast = window.cast || {};
document.body.style.backgroundColor = "orange"; // IF YOU SEE ORANGE, THE SCRIPT STARTED

const context = cast.framework.CastReceiverContext.getInstance();
const NAMESPACE = 'urn:x-cast:com.pedrocast.cast';

const options = new cast.framework.CastReceiverOptions();
// IMPORTANT: Tell the TV to expect JSON from your Sharpcaster C# app
options.customNamespaces = { 
    [NAMESPACE]: cast.framework.system.MessageType.JSON 
};

context.addCustomMessageListener(NAMESPACE, (event) => {
    // 1. Force the background to green to prove the C# message arrived
    document.body.style.backgroundColor = "green"; 

    // 2. Find the image and tell the code it IS an <img> element
    /** @type {HTMLImageElement} */
    const img = document.getElementById('bg'); 

    if (img && event.data.url) {
        img.src = event.data.url; // Now 'src' will work without error
        img.style.display = "block";
    }
});

context.start(options);
    </script>
</body>
</html>
